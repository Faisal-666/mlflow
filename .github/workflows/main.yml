name: CI

on:
  push:
    branches:
      - main
    paths-ignore:
      - mlruns/**
  pull_request:
    branches:
      - main

env:
  CSV_URL: 'MLproject/train_pca.csv'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3
        with:
          persist-credentials: false

      - name: Setup Python 3.12.7
        uses: actions/setup-python@v4
        with:
          python-version: '3.12.7'

      - name: Check Env
        run: echo $CSV_URL

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install mlflow

      - name: Run MLflow project
        run: |
          mlflow run MLproject --env-manager=local

      - name: Setup GIT LFS
        run: |
          git config --global user.name ${{ secrets.USERNAME }}
          git config --global user.email ${{ secrets.EMAIL }}
          git lfs install
          git lfs track 'mlruns/**'
          git add .gitattributes
          git commit -m 'tracking large files in mlruns with git lfs' || true
          git push origin main

      - name: Save models to GH repo
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"
          git remote set-url origin https://${{ secrets.USERNAME }}:${{ secrets.GH_PAT }}@github.com/${{ secrets.USERNAME }}/mlflow.git
          git add -f mlruns/
          git commit -m "save mlruns from CI run" || true
          git push origin main
